name: Test Labola Login

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install playwright python-dotenv
          playwright install chromium --with-deps

      - name: Test login from GitHub Actions IP
        env:
          LABOLA_EMAIL: ${{ secrets.LABOLA_EMAIL }}
          LABOLA_PASSWORD: ${{ secrets.LABOLA_PASSWORD }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: python test_login_only.py

      - name: Upload screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-login-screenshot-${{ github.run_id }}
          path: |
            login_error.png
            test_login_result.png
            before_login.png
          if-no-files-found: ignore
          retention-days: 7
