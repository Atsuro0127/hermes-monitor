name: Futsal Web Monitor

on:
  schedule:
    - cron: '* * * * *'  # 1分ごと
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install playwright python-dotenv
          playwright install chromium --with-deps

      - name: Run web monitor
        env:
          LABOLA_EMAIL: ${{ secrets.LABOLA_EMAIL }}
          LABOLA_PASSWORD: ${{ secrets.LABOLA_PASSWORD }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: python monitor_futsal_web.py

      - name: Upload login error screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: login-error-${{ github.run_id }}
          path: login_error.png
          if-no-files-found: ignore
          retention-days: 3

      - name: Save state to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add futsal_booked.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore: update futsal booked state"
          git push 2>/dev/null || true
